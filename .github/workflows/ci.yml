name: CI — Lint · Test · Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 从 GitHub Secrets 注入真实数据库连接（仅 build 阶段需要）
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Prisma generate 需要的数据库 URL（postinstall 用，不实际连接）
      # 从 secrets 注入，避免 Validation Error
      # NextAuth 签名密钥（用于服务端构建时的 token 签名）
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖（跳过 postinstall）
        run: npm ci --ignore-scripts

      - name: 生成 Prisma Client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: 代码检查（Lint）
        run: npm run lint

      - name: 运行测试
        run: npm test

      - name: 构建应用
        run: npm run build




