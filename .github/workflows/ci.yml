name: CI — Lint · Test · Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 从 GitHub Secrets 注入真实数据库连接（仅 build 阶段需要）
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # NextAuth 签名密钥（用于服务端构建时的 token 签名）
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 代码检查（Lint）
        run: npm run lint

      - name: 运行测试
        run: npm test

      - name: 构建应用
        run: npm run build
