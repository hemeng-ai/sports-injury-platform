name: Smoke Test (Production)

on:
  # Vercel 部署完成后自动触发
  deployment_status:
  # 手动触发
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL (leave default for production)'
        required: false
        default: 'https://sports-injury-platform.vercel.app'
  # 每天定时检查
  schedule:
    - cron: '0 2 * * *'

jobs:
  smoke:
    name: Smoke Test
    # 只在生产部署成功时自动跑；手动/定时始终跑
    if: |
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SMOKE_TEST_EMAIL: ${"${{ secrets.SMOKE_TEST_EMAIL }}"}
      SMOKE_TEST_PASSWORD: ${"${{ secrets.SMOKE_TEST_PASSWORD }}"}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Run smoke tests
        run: tsx scripts/smoke-test.mts ${"${{ github.event.inputs.target_url || 'https://sports-injury-platform.vercel.app' }}"}