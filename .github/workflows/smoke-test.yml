name: Smoke Test + Auto-Fix (Production)

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL"
        required: false
        default: "https://sports-injury-platform.vercel.app"
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  smoke-and-fix:
    name: Smoke Test + Auto-Fix
    if: |
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: |
          TARGET="${{ github.event.inputs.target_url || 'https://sports-injury-platform.vercel.app' }}"
          npx tsx scripts/smoke-test.mts "$TARGET" 2>&1 | tee smoke-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload smoke test log
        if: steps.smoke.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-failure
          path: smoke-output.log
          retention-days: 7

      - name: Auto-fix with DeepSeek
        id: autofix
        if: steps.smoke.outputs.exit_code != '0'
        continue-on-error: true
        run: npx tsx scripts/auto-fix.mts smoke-output.log 2>&1 | tee autofix-output.log

      - name: Notify — smoke test passed
        if: steps.smoke.outputs.exit_code == '0'
        run: npx tsx scripts/notify.mts smoke success

      - name: Notify — auto-fix succeeded
        if: steps.autofix.outcome == 'success'
        run: npx tsx scripts/notify.mts auto_fix success "自动修复已提交并推送，等待重新部署"

      - name: Notify — auto-fix failed (need manual)
        if: steps.autofix.outcome == 'failure'
        run: npx tsx scripts/notify.mts smoke failure "自动修复失败，需要人工介入"